name: autonomous-research-analyst

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT:-8000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
        NEXT_PUBLIC_BACKEND_STREAM_PATH: ${NEXT_PUBLIC_BACKEND_STREAM_PATH:-/research}
    env_file:
      - .env
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_BACKEND_STREAM_PATH: ${NEXT_PUBLIC_BACKEND_STREAM_PATH:-/research}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
